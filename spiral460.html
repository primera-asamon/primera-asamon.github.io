//2. パース
function parseData(raw) {
  return raw.split("\n").map(line => {
    const [s, e, label] = line.split(";");
    return {
      start: new Date(s),
      end: new Date(e),
      label
    };
  });
}

const events = parseData(rawData);

//3. 角度計算（あなたの仕様）
function dateToAngle(date) {
  const month = date.getMonth() + 1;
  const day = date.getDate();

  const baseMonthAngle = (month - 1) * 30;
  const d = Math.min(day, 30);
  const dayAngle = (d - 1);

  return baseMonthAngle + dayAngle;
}

//4. 年オフセット
const CURRENT_YEAR = 2026;

function yearOffset(date) {
  return CURRENT_YEAR - date.getFullYear();
}

//5. スロット割り当て（無制限）
function assignSlots(events) {
  events.sort((a, b) => a.start - b.start);

  const slots = [];

  events.forEach(ev => {
    let assigned = false;

    for (let i = 0; i < slots.length; i++) {
      if (slots[i] < ev.start) {
        ev.slot = i;
        slots[i] = ev.end;
        assigned = true;
        break;
      }
    }

    if (!assigned) {
      ev.slot = slots.length;
      slots.push(ev.end);
    }
  });

  return events;
}

assignSlots(events);

// 6. 半径計算（4年スパイラル）
const centerX = 300;
const centerY = 300;

const yearStep = 40;
const bandWidth = 30;
const slotWidth = bandWidth * 0.2;

function spiralRadius(date, slot) {
  const yOff = yearOffset(date);
  const base = 200 - yOff * yearStep;

  const slotCenter = base + (slot - 2) * slotWidth;

  const m = date.getMonth() + 1;
  const d = date.getDate();
  let leapExtend = 0;
  if (m === 2 && d > 28) {
    leapExtend = (d - 28) * 1.5;
  }

  return slotCenter + leapExtend;
}

//7. 極座標 → XY
function polarToXY(r, angleDeg) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return {
    x: centerX + r * Math.cos(rad),
    y: centerY + r * Math.sin(rad)
  };
}

// 8. イベント帯パス（通常帯）
function buildEventPath(ev) {
  const a1 = dateToAngle(ev.start);
  const a2 = dateToAngle(ev.end);

  const rCenter = spiralRadius(ev.start, ev.slot);
  const rInner = rCenter - slotWidth / 2;
  const rOuter = rCenter + slotWidth / 2;

  const p1 = polarToXY(rInner, a1);
  const p2 = polarToXY(rInner, a2);
  const p3 = polarToXY(rOuter, a2);
  const p4 = polarToXY(rOuter, a1);

  return `
    M ${p1.x},${p1.y}
    A ${rInner} ${rInner} 0 0 1 ${p2.x},${p2.y}
    L ${p3.x},${p3.y}
    A ${rOuter} ${rOuter} 0 0 0 ${p4.x},${p4.y}
    Z
  `;
}

// 9. 円弧（slot ≥ 6 用）
function buildArc(ev) {
  const a1 = dateToAngle(ev.start);
  const a2 = dateToAngle(ev.end);

  const r = spiralRadius(ev.start, 4); // slot4 と同じ高さに揃える

  const p1 = polarToXY(r, a1);
  const p2 = polarToXY(r, a2);

  return `
    M ${p1.x},${p1.y}
    A ${r} ${r} 0 0 1 ${p2.x},${p2.y}
  `;
}

// 10. 月ガイドライン
function drawMonthGuidelines(svg) {
  for (let m = 0; m < 12; m++) {
    const angle = m * 30;
    const p1 = polarToXY(50, angle);
    const p2 = polarToXY(260, angle);

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", p1.x);
    line.setAttribute("y1", p1.y);
    line.setAttribute("x2", p2.x);
    line.setAttribute("y2", p2.y);
    line.setAttribute("stroke", "#ccc");
    line.setAttribute("stroke-width", "1");
    line.setAttribute("stroke-dasharray", "4 4");

    svg.appendChild(line);
  }
}

// 11. ツールチップ
const tooltip = document.getElementById("tooltip");

function showTooltip(ev, x, y) {
  tooltip.style.left = (x + 10) + "px";
  tooltip.style.top = (y + 10) + "px";
  tooltip.style.display = "block";

  tooltip.innerHTML = `
    <div><strong>${ev.label}</strong></div>
    <div>${ev.start.toISOString().slice(0,10)} → ${ev.end.toISOString().slice(0,10)}</div>
    <div>スロット: ${ev.slot}</div>
  `;
}

function hideTooltip() {
  tooltip.style.display = "none";
}

// 12. 描画（slot に応じて分岐）
function render() {
  const svg = document.getElementById("spiralSvg");
  svg.setAttribute("viewBox", "0 0 600 600");

  drawMonthGuidelines(svg);

  events.forEach(ev => {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    if (ev.slot <= 4) {
      // 通常帯
      path.setAttribute("d", buildEventPath(ev));
      path.setAttribute("fill", "rgba(255,100,100,0.5)");
      path.setAttribute("stroke", "red");
      path.setAttribute("stroke-width", "1");

    } else if (ev.slot === 5) {
      // 極細帯
      path.setAttribute("d", buildEventPath(ev));
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "red");
      path.setAttribute("stroke-width", "0.5");

    } else {
      // slot >= 6 → 黒い円弧
      path.setAttribute("d", buildArc(ev));
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "black");
      path.setAttribute("stroke-width", "3");
    }

    path.addEventListener("mousemove", (e) => {
      showTooltip(ev, e.clientX, e.clientY);
    });
    path.addEventListener("mouseleave", hideTooltip);

    svg.appendChild(path);
  });
}
render();
</script>
